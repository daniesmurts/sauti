# Nginx reverse proxy — Sauti
# Deploy path on server: /etc/nginx/sites-available/sauti
# Replace all REPLACE_WITH_* values, or let setup-server.sh fill them in.
#
# This file handles:
#   - TLS termination (Let's Encrypt)
#   - V2Ray WebSocket proxy (obfuscated traffic on secret path)
#   - Conduwuit Matrix homeserver proxy (/_matrix and /.well-known/matrix)

server {
    listen 80;
    server_name REPLACE_WITH_YOUR_DOMAIN;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name REPLACE_WITH_YOUR_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/REPLACE_WITH_YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/REPLACE_WITH_YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # V2Ray WebSocket — secret path, keep private
    # Change REPLACE_WITH_V2RAY_PATH to match /etc/v2ray/config.json
    location REPLACE_WITH_V2RAY_PATH {
        proxy_pass http://127.0.0.1:10086;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Matrix homeserver — all Matrix API traffic
    location /_matrix {
        proxy_pass http://127.0.0.1:6167;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Host $host;
        client_max_body_size 20M;
    }

    # Matrix server well-known discovery
    location /.well-known/matrix {
        proxy_pass http://127.0.0.1:6167;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        return 404;
    }
}
