# Coturn TURN Server — Sauti configuration template
# Deploy path on server: /etc/turnserver.conf
# Replace all REPLACE_WITH_* values, or let setup-server.sh fill them in.
#
# This template uses static long-term credentials so it matches the app's
# TURN_SERVER_USERNAME / TURN_SERVER_CREDENTIAL environment variables.

listening-port=3478
tls-listening-port=5349

fingerprint
lt-cred-mech
user=REPLACE_WITH_TURN_USERNAME:REPLACE_WITH_TURN_SECRET
realm=REPLACE_WITH_YOUR_DOMAIN

# TLS certificates (shared with Nginx/Conduit via Let's Encrypt)
cert=/etc/letsencrypt/live/REPLACE_WITH_YOUR_DOMAIN/fullchain.pem
pkey=/etc/letsencrypt/live/REPLACE_WITH_YOUR_DOMAIN/privkey.pem

total-quota=100
bps-capacity=0
stale-nonce=600
no-stdout-log
syslog

# Logging
log-file=/var/log/turnserver.log
